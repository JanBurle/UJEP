    <script>
      window.onload = () => {
        let xmlDoc = loadXmlDoc()

        let html = ''

        let add = (name, val) => {
          html += `<tr><td>${name}:</td><td>${val}</td></tr>`
        }

        for (let predmet of xmlDoc.children) {
          let get = (i) => predmet.children[i].innerHTML
          add('Název', get(0))
          add('Lektor', get(1))
          add('KB', get(2))
          add('Rok', get(3))
        }

        d.getElementById('table').innerHTML = html
      }
    </script>
  </head>

  <body>
    <h1>Popis předmětu</h1>
    <table id="table"></table>
  </body>
