services:

  # PHP a Apache, popsáno v Dockerfile
  php-apache-environment:
    container_name: php-apache
    build:
      context: ./php              # zde se nalézá Dockerfile
      dockerfile: Dockerfile
    depends_on:
      - db
    volumes:
      - ./php/src:/var/www/html/  # vnější složka ./php/src bude mapována na vnitřní /var/www/html/
    ports:
      - 8000:80                   # vnitřní port 80 bude zveřejněn jako 8000

  #instalace databaze MySQL
  db:
    container_name: db
    image: mysql                  # základní obraz
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: admin
      MYSQL_PASSWORD: heslo
    ports:
      - 9906:3306                 # standardní MySQL port 3306 zveřejněn jako 9906

  #instalace phpmyadmin pro spravu databazi
  phpmyadmin:
    image: phpmyadmin/phpmyadmin  # základní obraz
    ports:
      - 8080:80                   # port 80 bude zveřejněn jako 8080
    restart: always
    environment:
      PMA_HOST: db
    depends_on:
      - db
