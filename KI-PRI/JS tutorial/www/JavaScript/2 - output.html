<!DOCTYPE html>
<html lang="en">
  <body>
    <script>
      // full name
      window.alert('window.alert')
      // brief name
      alert('alert')

      // full name
      window.console.log('window.console.log')
      // brief name
      console.log('console.log')

      // in console sidebar
      console.debug('debug') // verbose
      console.assert(true) // nothing
      console.assert(false) // error
      console.trace('stack') // stack
    </script>
  </body>
</html>
