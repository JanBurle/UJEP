<!DOCTYPE html>
<html lang="en">
  <body>
    <script>
      // zkratka
      l = console.log
    </script>

    <style>
      h1 {
        cursor: pointer;
      }
    </style>

    <h1 onclick="l('click')" onmouseenter="l('enter')" onmouseleave="l('leave')">H1 - 1</h1>

    <script>
      let entered = (el) => (el.style.background = 'yellow')
      let left = (el) => (el.style.background = '')
    </script>

    <h1
      onclick="this.style.color = 'red'"
      ondblclick="this.style.color = ''"
      onmouseenter="entered(this)"
      onmouseleave="left(this)"
    >
      H1 - 2
    </h1>

    <style>
      h1.sel {
        color: red;
      }
    </style>
    <h1 onclick="this.classList.toggle('sel')">H1 - 3</h1>

    <button onclick="l('button clicked')">Button</button>
  </body>
</html>
