<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta charset="UTF-8" />
  <title>Proměnné</title>

  <link rel="stylesheet" href="assets/main.css" />
</head>

<body>
  <script>
    // Řádky začínající //* po odkomentování způsobí chybu:
    {
      // nedefinovaná proměnná (Uncaught ReferenceError)
      //* console.log('xA:', x)
      x = 3
      console.log('xB:', x)
    }

    {
      // hoisted proměnná (bez inicializace)
      console.log('yA:', y) // undefined
      var y = 4
      console.log('yB:', y)
    }

    {
      // neinicializovaná proměnná (Cannot access before initialization)
      //* console.log('zA:', z)
      let z
      console.log('zB:', z)
    }

    {
      // neinicializovaná proměnná (Uncaught SyntaxError)
      //* const c // = 5
      //* console.log('c:', c)
    }
  </script>
</body>

</html>
