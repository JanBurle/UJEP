<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    :root {
      --space: .2rem;
    }

    body {
      border: thick solid orangered;
      min-width: 10rem;
    }

    /* default: light mode */
    :root {
      --bg-color: #fff;
      --text-color: #000;
    }

    /* or: dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #222;
        --text-color: #fff;
      }
    }

    body {
      color: var(--text-color);
      background-color: var(--bg-color);
      /* shortcut: */
      /* background: var(--bg-color); */
    }

    div {
      margin: var(--space);
      padding: var(--space);
      border: thin solid blue;
    }

    div.Brian::after {
      content: "Romanes eunt domus";
    }

    @media (prefers-color-scheme: dark) {
      div.Brian::after {
        content: "Romani ite domum";
      }
    }
  </style>
</head>

<body>
  <div>
    <div>
      <div class="Brian">
      </div>
    </div>
  </div>
</body>

</html>
